server:
  port: ${SERVER_PORT:8080}

# ── System database ───────────────────────────────────────────────────────────
# Local dev:   auto-provisioned Postgres container on port 5499 (SystemDbProvisioner)
# Docker/Compose: provided by the postgres service; set SPRING_DATASOURCE_URL env var
spring:
  datasource:
    # H2 file-based embedded database — no Docker image pull required
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/dbdeployer;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:dbdeployer}
    password: ${SPRING_DATASOURCE_PASSWORD:dbdeployer_internal}
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

dbdeployer:
  cors:
    # Comma-separated allowed origins. Defaults to dev ports when running locally.
    # Set DBDEPLOYER_CORS_ORIGINS=* for fully open (still local-only app).
    allowed-origins: ${DBDEPLOYER_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
  pipeline:
    step-delay-ms: 1500

logging:
  level:
    com.dbdeployer: INFO
    org.hibernate.SQL: WARN

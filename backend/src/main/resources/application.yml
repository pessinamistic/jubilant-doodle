server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

application:
  title: Port Wrangler
  version: dev

# ── System database ───────────────────────────────────────────────────────────
# Standalone / local dev:
#   SystemDbProvisioner auto-launches a postgres:16 container on host port 5499
#   before Spring starts.  No extra config needed.
#
# Docker Compose mode:
#   Set DBDEPLOYER_SYSTEM_DB_AUTO_PROVISION=false and override SPRING_DATASOURCE_URL
#   to point at the compose 'postgres' service (see docker-compose.yml).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5499/dbdeployer}
    username: ${SPRING_DATASOURCE_USERNAME:dbdeployer}
    password: ${SPRING_DATASOURCE_PASSWORD:dbdeployer_internal}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    open-in-view: false
    hibernate:
      # validate: Hibernate checks entity mappings exist in the DB but never mutates schema.
      # All schema changes must go through Liquibase changesets in db/changelog/changes/.
      # EXISTING INSTALLS: run `./gradlew liquibaseChangelogSync` ONCE against the running
      # system DB before restarting the app, so Liquibase marks V1-V4 as already applied.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # ── Spring AI (Phase 3+) ───────────────────────────────────────────────────
  # Ollama is the default local LLM runtime. base-url points at a deployed Ollama
  # container's published port (override per request via ModelRouter). Model beans
  # are created lazily, so app boot does NOT require Ollama to be running.
  ai:
    ollama:
      base-url: ${PORTWRANGLER_OLLAMA_BASE_URL:http://localhost:11434}
      init:
        # Never auto-pull models at startup — pulls go through ModelPullStep.
        pull-model-strategy: never
        chat:
          include: false
        embedding:
          include: false
    chat:
      memory:
        repository:
          jdbc:
            # Liquibase owns SPRING_AI_CHAT_MEMORY (V7); do not auto-create it.
            initialize-schema: never
    vectorstore:
      pgvector:
        # Liquibase owns vector_store (V8) — do not auto-create. Fixed 768 dims
        # (nomic-embed-text), HNSW + cosine. Explicit dims avoid an Ollama call at boot.
        initialize-schema: false
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

dbdeployer:
  cors:
    # Comma-separated allowed origins. Defaults to dev ports when running locally.
    # Set DBDEPLOYER_CORS_ORIGINS=* for fully open (still local-only app).
    allowed-origins: ${DBDEPLOYER_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
  pipeline:
    step-delay-ms: 1500
  image-validation:
    scheduler-enabled: true
    docker-hub-timeout-ms: 4000
    local-refresh-interval-ms: 120000
    docker-hub-refresh-interval-ms: 21600000
    hub-request-concurrency: 10
  system-db:
    auto-provision: ${DBDEPLOYER_SYSTEM_DB_AUTO_PROVISION:true}
    container-name: ${DBDEPLOYER_SYSTEM_DB_CONTAINER_NAME:dbdeployer-system-db}
    image: postgres:16
    host-port: ${DBDEPLOYER_SYSTEM_DB_PORT:5499}
    username: ${DBDEPLOYER_SYSTEM_DB_USERNAME:dbdeployer}
    password: ${DBDEPLOYER_SYSTEM_DB_PASSWORD:dbdeployer_internal}
    database: dbdeployer
    # Host directory mounted into the Postgres container for data persistence.
    data-dir: ${DBDEPLOYER_SYSTEM_DB_DATA_DIR:${user.home}/.db-deployer/system-db}
  logging:
    api:
      verbose: ${DBDEPLOYER_API_LOG_VERBOSE:false}

logging:
  level:
    com.dbdeployer: INFO
    com.dbdeployer.config.ApiRequestLoggingInterceptor: INFO
    org.hibernate.SQL: WARN

server:
  port: ${SERVER_PORT:8080}

# ── System database ───────────────────────────────────────────────────────────
# Local dev:   auto-provisioned Postgres container on port 5499 (SystemDbProvisioner)
# Docker/Compose: provided by the postgres service; set SPRING_DATASOURCE_URL env var
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5499/dbdeployer}
    username: ${SPRING_DATASOURCE_USERNAME:dbdeployer}
    password: ${SPRING_DATASOURCE_PASSWORD:dbdeployer_internal}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000   # wait up to 60s for Postgres to be ready
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── System DB provisioner config ──────────────────────────────────────────────
# auto-provision: set to false when the system DB is supplied externally (e.g. docker-compose)
dbdeployer:
  system-db:
    auto-provision: ${DBDEPLOYER_SYSTEM_DB_AUTO_PROVISION:true}
    container-name: dbdeployer-system-db
    image: postgres:16
    host-port: 5499
    username: ${SPRING_DATASOURCE_USERNAME:dbdeployer}
    password: ${SPRING_DATASOURCE_PASSWORD:dbdeployer_internal}
    database: dbdeployer
  cors:
    # Comma-separated allowed origins. Defaults to dev ports when running locally.
    # Set DBDEPLOYER_CORS_ORIGINS=* for fully open (still local-only app).
    allowed-origins: ${DBDEPLOYER_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
  pipeline:
    step-delay-ms: 1500

logging:
  level:
    com.dbdeployer: INFO
    org.hibernate.SQL: WARN

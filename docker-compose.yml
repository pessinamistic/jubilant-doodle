services:

  # ── DB Deployer application ───────────────────────────────────────────────
  # The system database is now an embedded H2 file — no external Postgres needed.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbdeployer-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Docker socket URI — bind-mounted from the host below.
      DOCKER_HOST: unix:///var/run/docker.sock

      # Optional: set a custom CORS allowed-origins pattern (comma-separated)
      # DBDEPLOYER_CORS_ORIGINS: "http://localhost:8080,http://myhost:8080"
    volumes:
      # ── Docker socket ──────────────────────────────────────────────────────
      # Colima: the socket lives at ~/.colima/default/docker.sock on the host.
      # We expose it at the standard /var/run/docker.sock path inside the
      # container so the app's DockerSocketResolver picks it up automatically.
      #
      # If you use Docker Desktop, replace the source path with:
      #   /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

      # ── Managed DB data directory ─────────────────────────────────────────
      # Volumes for user-deployed databases live under ~/.db-deployer/data/ on
      # the host so they survive container rebuilds and restarts.
      - ${HOME}/.db-deployer:/root/.db-deployer

      # ── H2 system database persistence ───────────────────────────────────
      # Stores the embedded H2 .mv.db file so Port Wrangler's own metadata
      # (instances, pipelines) survives container restarts and rebuilds.
      - ${HOME}/.db-deployer/system:/app/data

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Build, check formatting, and run tests
        working-directory: backend
        run: ./gradlew build spotlessCheck
        env:
          # SystemDbProvisioner is disabled in tests; the integration test spins up its
          # own PostgreSQL via Testcontainers against the real Docker socket on the runner.
          DBDEPLOYER_SYSTEM_DB_AUTO_PROVISION: "false"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/build/reports/tests/
          retention-days: 7

name: Release — Build & Publish Installers

# Triggered by version tags: v1.0.0, v2.3.1, etc.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to upload assets to the GitHub Release

jobs:
  build-installer:
    name: Build ${{ matrix.pkg-type }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pkg-type: dmg
            artifact-glob: '*.dmg'
          - os: windows-latest
            pkg-type: exe
            artifact-glob: '*.exe'

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Build React frontend ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── 3. Copy built frontend into Spring Boot static resources ─────────────
      - name: Inject frontend into Spring Boot static resources
        shell: bash
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/. backend/src/main/resources/static/

      # ── 4. Build Spring Boot fat JAR ─────────────────────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build fat JAR
        working-directory: backend
        run: ./gradlew bootJar -x test --no-daemon

      # ── 5. Verify WiX (Windows only — required by jpackage for EXE) ──────────
      - name: Verify WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $wix = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $wix) {
            $paths = @(
              "C:\Program Files (x86)\WiX Toolset v3.11\bin",
              "C:\Program Files\WiX Toolset v3.11\bin"
            )
            foreach ($p in $paths) {
              if (Test-Path "$p\candle.exe") {
                echo "$p" >> $env:GITHUB_PATH
                Write-Host "WiX found at $p"
                exit 0
              }
            }
            Write-Error "WiX Toolset not found – installer build will fail"
            exit 1
          }
          Write-Host "WiX already on PATH: $($wix.Source)"

      # ── 6. Create native installer via jpackage ──────────────────────────────
      - name: Build ${{ matrix.pkg-type }} installer
        working-directory: backend
        shell: bash
        run: ./gradlew jpackageInstaller -Pjpackage.type=${{ matrix.pkg-type }} --no-daemon

      # ── 7. List produced artifacts (debug) ───────────────────────────────────
      - name: List dist output
        shell: bash
        run: ls -lh backend/build/dist/

      # ── 8. Upload installer to GitHub Release ────────────────────────────────
      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/build/dist/${{ matrix.artifact-glob }}
          generate_release_notes: true
          fail_on_unmatched_files: true
